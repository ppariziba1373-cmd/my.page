!<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت نام</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">
        <div class="form-box">
            <h2>ثبت نام</h2>
            <form id="registerForm">
                <div class="input-group">
                    <label for="name">نام و نام خانوادگی</label>
                    <input type="text" id="name" placeholder="علی محمدی" required>
                </div>
                <div class="input-group">
                    <label for="email">ایمیل</label>
                    <input type="email" id="email" placeholder="example@gmail.com" required>
                </div>
                <div class="input-group">
                    <label for="phone">شماره موبایل</label>
                    <input type="tel" id="phone" placeholder="09123456789" required>
                </div>
                <div class="input-group">
                    <label for="password">رمز عبور</label>
                    <input type="password" id="password" placeholder="حداقل ۸ کاراکتر" required>
                </div>
                <div class="input-group">
                    <label for="confirm">تکرار رمز عبور</label>
                    <input type="password" id="confirm" placeholder="دوباره رمز را وارد کنید" required>
                </div>
                <button type="submit" class="btn">ثبت نام</button>
            </form>
            <p class="login-link">حساب کاربری دارید؟ <a href="#">وارد شوید</a></p>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
