<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقعیت من</title>
    <style>
        body {
            font-family: Tahoma, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .pin-icon {
            font-size: 80px;
            margin-bottom: 10px;
        }

        h2 {
            color: #333;
            font-size: 50px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 75, 43, 0.4);
            transition: all 0.3s ease;
        }

        a:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(235, 192, 184, 0.6);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="pin-icon">📍</div>
        <h2>موقعیت دقیق ما</h2>
        <div>
            <a href="tel:+989120000000">تماس با ما: 0912000000</a>
        </div>
        <!-- فقط مختصات خودت رو اینجا عوض کن -->
        <a href="https://www.google.com/maps?q=34.67160025260143, 50.85949053302875" target="_blank">مشاهده در گوگل
            مپ</a>
    </div>

</body>

</html>
